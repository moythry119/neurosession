version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: neurosession_postgres
    environment:
      POSTGRES_DB: neurosession_db
      POSTGRES_USER: neurosession_user
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - neurosession_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: neurosession_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@neurosession.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  neurosession_data: